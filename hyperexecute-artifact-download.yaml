stages:
  - trigger
  - download

variables:
  CONCURRENCY:    "1"
  BUILD_TITLE:    "GitLab_Pipeline_Run"
  POLL_INTERVAL:  "15"
  POLL_TIMEOUT:   "3600"

# ── Stage 1: Trigger test run instantly, wait 1 hour, then download artifacts ─
trigger_and_download:
  stage: trigger
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl zip
    - pip install requests --quiet
  script:
    # ── Step 1: Fire the curl trigger immediately ──────────────────────────────
    - echo "==> Triggering test run ${TEST_RUN_ID}"
    - |
      TRIGGER_RESPONSE=$(curl --silent --fail --location \
        'https://test-manager-api.lambdatest.com/api/atm/v1/hyperexecute' \
        --header 'Content-Type: application/json' \
        --header "Authorization: Basic ${LT_AUTH_TOKEN}" \
        --data "{
          \"test_run_id\": \"${TEST_RUN_ID}\",
          \"concurrency\": ${CONCURRENCY},
          \"title\": \"${BUILD_TITLE}\",
          \"console_log\": false,
          \"network_logs\": false,
          \"network_full_har\": false,
          \"retry_on_failure\": true,
          \"max_retries\": 1,
          \"accessibility\": false
        }")
      echo "==> Trigger response: ${TRIGGER_RESPONSE}"

    # ── Step 2: Wait 1 hour before downloading ────────────────────────────────
    - echo "==> Waiting 1 hour before downloading artifacts..."
    - sleep 3600
    - echo "==> 1 hour wait complete, starting artifact download"

    # ── Step 3: Download artifacts using the trigger response ─────────────────
    - |
      echo "${TRIGGER_RESPONSE}" \
      | LT_USERNAME=${LT_USERNAME} \
        LT_ACCESS_KEY=${LT_ACCESS_KEY} \
        POLL_INTERVAL=${POLL_INTERVAL} \
        POLL_TIMEOUT=${POLL_TIMEOUT} \
        python3 hyperexecute_artifacts.py
    - echo "==> Download complete"

  after_script:
    - |
      JOB_DIR=$(ls -d */ 2>/dev/null | grep -E '^[0-9a-f-]{36}/$' | head -1 | tr -d '/')
      if [ -n "${JOB_DIR}" ]; then
        zip -r "${JOB_DIR}.zip" "${JOB_DIR}/"
        echo "==> Bundle ready: ${JOB_DIR}.zip"
      fi
  artifacts:
    name: "hyperexecute-artifacts-${CI_PIPELINE_ID}"
    paths:
      - "*.zip"
      - "**/artifact_summary.json"
    expire_in: 7 days
    when: always
